name: Daily Job Search & Listing Verification

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-jobs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # --- scraped jobs (public/jobs.json) ---
      - name: Search for new scraped jobs
        run: node scripts/search-jobs.mjs

      - name: Prune dead scraped jobs
        run: node scripts/verify-jobs.mjs

      # --- curated company listings (src/data/companies.js) ---
      - uses: astral-sh/setup-uv@v6

      - name: Verify curated listings with JobSpy
        run: |
          uv venv .venv
          uv pip install python-jobspy
          .venv/bin/python scripts/verifyListings.py --apply

      # --- commit & deploy ---
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/jobs.json public/geocoding-cache.json src/data/companies.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily job search update $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Build site
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
