name: Daily SDET Job Search (Vienna)

on:
  schedule:
    - cron: '0 7 * * *' # Every day at 07:00 UTC (09:00 Vienna/CEST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Search for jobs
        run: node scripts/search-jobs.mjs

      - name: Verify liveness of scraped jobs
        run: node scripts/verify-jobs.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/latest-jobs.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily job search update $(date +'%Y-%m-%d')"
            git push
          fi
